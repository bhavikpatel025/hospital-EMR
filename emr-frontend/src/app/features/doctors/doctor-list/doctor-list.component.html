<section class="emr-page">

  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 w-100 mb-3" style="min-height: 52px;">
    <div class="d-flex align-items-center gap-2 flex-wrap flex-grow-1">
      <div class="emr-input-group emr-input--search" style="min-width: 260px; max-width: 400px; flex-grow: 1;">
        <input [ngModel]="searchTerm" (ngModelChange)="onSearchChange($event)" placeholder="Search by Name, Specialization, Email..." />
        <mat-icon style="color: var(--emr-text-soft);">search</mat-icon>
      </div>

      <button type="button" class="emr-button--ghost" *ngIf="searchTerm" (click)="onSearchChange('')" title="Clear Search" style="white-space: nowrap;">
        <mat-icon>filter_list</mat-icon>
        <span>Clear Search</span>
      </button>
    </div>

    <div class="ms-auto">
      <button type="button" class="emr-button" (click)="onAdd()" style="white-space: nowrap;">
        <mat-icon>add</mat-icon>
        <span>Add New Doctor</span>
      </button>
    </div>
  </div>

  <div class="emr-card">
    <div class="text-center py-5" *ngIf="loading()">
      <mat-spinner class="mx-auto"></mat-spinner>
    </div>

    <div class="emr-table-wrap" *ngIf="!loading() && doctors().length">
      <table class="emr-table">
        <thead>
          <tr>
            <th>Id</th>
            <th>Doctor Name</th>
            <th>Specialization</th>
            <th>Email</th>
            <th>Consultation Fee</th>
            <th class="text-end">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let doc of doctors()">
            <td>
              <strong style="color: #435b71;">{{ formatId(doc.doctorId) }}</strong>
            </td>
            <td>
              <div class="emr-table__name">
                <div class="emr-avatar" [ngClass]="'avatar-' + (doc.doctorId % 5)">{{ initials(doc.fullName) }}</div>
                <div>
                  <strong style="color: #1a2e40;">Dr. {{ doc.fullName }}</strong>
                </div>
              </div>
            </td>
            <td>
              <span class="emr-pill emr-pill--info">{{ doc.specialization }}</span>
            </td>
            <td>{{ doc.email }}</td>
            <td>
              <strong style="color: #0f3960;">₹{{ doc.consultationFee }}</strong>
            </td>
            <td class="text-end">
              <div class="emr-icon-actions justify-content-end">
                <button type="button" (click)="onEdit(doc.doctorId)" title="Edit doctor profile">
                  <mat-icon>edit</mat-icon>
                </button>
                <button type="button" (click)="onDelete(doc.doctorId, doc.fullName)" title="Delete doctor">
                  <mat-icon>delete</mat-icon>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="emr-empty" *ngIf="!loading() && doctors().length === 0">
      No doctors matched the current search query.
    </div>

    <div class="emr-table-footer">
      <div class="emr-muted">
        {{ showingRangeText }}
      </div>
      <mat-paginator
        [length]="totalCount()"
        [pageSize]="pageSize"
        [pageSizeOptions]="[5, 10, 25, 50]"
        (page)="onPageChange($event)"
        showFirstLastButtons>
      </mat-paginator>
    </div>
  </div>
</section>
